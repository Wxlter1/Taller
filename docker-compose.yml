version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./best.pt:/app/best.pt:ro
      - ./backend:/app/backend:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - backend

  edge:
    build:
      context: .
      dockerfile: Dockerfile.edge
    depends_on:
      - backend
    environment:
      - BACKEND_URL=http://backend:8000
    volumes:
      - ./best.pt:/app/best.pt:ro
      - ./video_dia.mp4:/app/video_dia.mp4:ro
    restart: unless-stopped
